server:
  port: 9990

spring:
  jackson:
    default-property-inclusion: non_null
  application:
    name: rock-metadata-service
  datasource:
    url: jdbc:postgresql://localhost:5432/rock_metadata
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  ai:
    mcp:
      server:
        name: rock-metadata-service
        version: 1.0.0
        type: SYNC
        sse-message-endpoint: /mcp/message

# Async thread pool for crawl jobs
metadata:
  crawl:
    thread-pool-size: 5
    retain-count: 2
  dataset:
    thread-pool-size: 3
    max-execution-time-seconds: 300
    max-rows-per-node: 10000
    query-timeout-seconds: 30
    max-snapshot-size-bytes: 104857600
    retain-instance-count: 10
  mcp:
    api-key: ${MCP_API_KEY:}
