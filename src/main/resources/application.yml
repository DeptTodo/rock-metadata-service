server:
  port: 9990

spring:
  jackson:
    default-property-inclusion: non_null
  application:
    name: rock-metadata-service
  datasource:
    url: jdbc:postgresql://localhost:5432/rock_metadata
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 5000
      leak-detection-threshold: 60000
      pool-name: rock-metadata-pool
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  ai:
    mcp:
      server:
        name: rock-metadata-service
        version: 1.0.0
        type: SYNC
        protocol: SSE

# Async thread pool for crawl jobs
metadata:
  crawl:
    thread-pool-size: 5
    retain-count: 2
  dataset:
    thread-pool-size: 50
    max-execution-time-seconds: 300
    max-rows-per-node: 10000
    query-timeout-seconds: 30
    max-snapshot-size-bytes: 104857600
    retain-instance-count: 10
  mcp:
    api-key: ${MCP_API_KEY:}
